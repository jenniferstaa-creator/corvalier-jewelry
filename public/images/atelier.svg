<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1250" viewBox="0 0 1000 1250">
  <defs>
    <radialGradient id="bg" cx="42%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#2a221b"/>
      <stop offset="45%" stop-color="#15110e"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </radialGradient>
    <linearGradient id="g-0tqx2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2CD9F"/>
      <stop offset="50%" stop-color="#C9A66B"/>
      <stop offset="100%" stop-color="#E2CD9F"/>
    </linearGradient>
    <radialGradient id="floor" cx="50%" cy="78%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="facetglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="1250" fill="url(#bg)"/>
  <ellipse cx="500" cy="980" rx="360" ry="120" fill="url(#floor)"/>
  
    
    <g filter="url(#facetglow)">
      <polygon points="500,350 570,404 500,494 430,404" fill="#ffffff" opacity="0.96"/>
      <polygon points="430,404 500,494 500,404" fill="#dfe6ef" opacity="0.85"/>
      <polygon points="570,404 500,494 500,404" fill="#c7d0dd" opacity="0.8"/>
      <polygon points="500,350 570,404 500,404 430,404" fill="#ffffff" opacity="0.6"/>
    </g>
    <ellipse cx="500" cy="700" rx="150" ry="156" fill="none" stroke="url(#g-0tqx2)" stroke-width="26"/>
    <ellipse cx="500" cy="700" rx="150" ry="156" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4"/>
  <rect width="1000" height="1250" fill="url(#vig)"/>
  <rect width="1000" height="1250" filter="url(#grain)" opacity="0.5"/>
</svg>